<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Bembé — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<link rel="stylesheet" href="styles.css">
<body>

<!-- ════════════════ PORTADA ════════════════ -->
<div id="portada">
  <div class="portada-ornamento"></div>
  <h1 class="portada-titulo">El Bembé</h1>
  <p class="portada-subtitulo">Esquina Gastronómica</p>
  <div class="portada-ornamento2"></div>
  <p class="portada-pregunta">¿A cuál vas hoy?</p>
  <div class="conceptos-grid">
    <button class="concepto-btn" onclick="abrirMenu('pizzeria')">
      <span class="concepto-emoji">🍕</span>
      <div class="concepto-info">
        <span class="concepto-nombre">La Pizzería</span>
        <span class="concepto-desc">Pizzas artesanales · 30, 40 y 50cm</span>
      </div>
      <span class="concepto-arrow">→</span>
    </button>
    <button class="concepto-btn" onclick="abrirMenu('gastrobar')">
      <span class="concepto-emoji">🍔</span>
      <div class="concepto-info">
        <span class="concepto-nombre">El Bembé Gastro Bar</span>
        <span class="concepto-desc">Burgers · Perros · Asados · Picadas</span>
      </div>
      <span class="concepto-arrow">→</span>
    </button>
    <button class="concepto-btn" onclick="abrirMenu('chiringuito')">
      <span class="concepto-emoji">🍹</span>
      <div class="concepto-info">
        <span class="concepto-nombre">El Chiringuito</span>
        <span class="concepto-desc">Cócteles · Cervezas · Bebidas</span>
      </div>
      <span class="concepto-arrow">→</span>
    </button>
  </div>
</div>

<!-- ════════════════ MENÚ CONTAINER ════════════════ -->
<div id="menu-container">
  <div class="menu-header">
    <button class="btn-volver" onclick="volverPortada()">←</button>
    <div class="header-info">
      <div class="header-nombre" id="header-nombre"></div>
      <div class="header-sub">El Bembé · 324-8009246</div>
    </div>
  </div>
  <div class="menu-body" id="menu-body"></div>
</div>

<!-- BARRA TOTAL -->
<div class="total-bar" id="total-bar">
  <div class="total-linea">
    <span class="total-label">Total del pedido</span>
    <span class="total-valor" id="total-display">$0</span>
  </div>
  <div class="btns-pedido">
    <button class="btn-pedido btn-wsp" onclick="abrirModal()">📲 Ver pedido</button>
    <button class="btn-pedido btn-limpiar" onclick="limpiarPedido()">Limpiar</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal-pedido">
  <div class="modal-box">

    <div class="modal-titulo" id="modal-titulo">Tu pedido</div>

    <div class="modal-items" id="modal-items"></div>
    <div class="modal-total" id="modal-total"></div>

    <!-- FORMULARIO -->
    <form id="pedidoForm">

      <section class="menu-section">
        <h2>📝 Detalles del Cliente</h2>

        <div class="form-group">
          <label>👤 Nombre:</label>
          <input type="text" id="nombre" required>
        </div>

        <div class="form-group">
          <label>📞 Número:</label>
          <input type="tel" id="telefono" required>
        </div>

        <div class="form-group">
          <label>📦 Tipo de entrega:</label>
          <select id="tipoEntrega">
            <option value="">-- Selecciona --</option>
            <option value="local">Recoger en el local</option>
            <option value="domicilio">Domicilio</option>
            <option value="comer">Comer en el local</option>
          </select>
        </div>

        <div class="form-group" id="direccionField" style="display:none;">
          <label>📍 Dirección:</label>
          <input type="text" id="direccion">
        </div>

        <div class="form-group" id="mesaField" style="display:none;">
          <label>🪑 Mesa:</label>
          <input type="text" id="numeroMesa">
        </div>

        <div class="form-group">
          <label>💳 Método de pago:</label>
          <select id="tipoPago">
            <option value="">-- Selecciona --</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Nequi">Nequi</option>
            <option value="Bancolombia">Bancolombia</option>
            <option value="Llave">Llave</option>
            <option value="Bold">Llave Bold</option>
            <option value="Datafono">Datáfono</option>
          </select>
        </div>

        <!-- INFO DINÁMICA DE PAGO -->
        <div class="form-group" id="infoPago" style="display:none;">
  <div id="textoPago" style="font-size:14px; line-height:1.4;"></div>
</div>

        <div class="form-group" id="efectivoField" style="display:none;">
          <label>💵 ¿Con cuánto pagas?</label>
          <input type="text" id="efectivoCliente">
        </div>

        <div class="form-group">
          <label>📝 Extras:</label>
          <textarea id="especificaciones"></textarea>
        </div>

      </section>

    </form>

    <!-- BOTONES -->
    <div class="modal-btns">
      <button class="btn-confirmar" onclick="enviarWhatsApp()">✅ Enviar por WhatsApp</button>
      <button class="btn-cancelar" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

  <script>
function enviarWhatsApp() {
  const lineas = [];
  let total = 0;

  pedidoGlobal.forEach(i => {
    lineas.push(`• ${i.nombre} x${i.cant}`);
    total += i.precio * i.cant;
  });

  if (lineas.length === 0) { cerrarModal(); return; }

  const nombre    = document.getElementById('nombre')?.value?.trim();
  const telefono  = document.getElementById('telefono')?.value?.trim();
  const entrega   = document.getElementById('tipoEntrega')?.value;
  const direccion = document.getElementById('direccion')?.value?.trim();
  const mesa      = document.getElementById('numeroMesa')?.value?.trim();
  const pago      = document.getElementById('tipoPago')?.value;
  const efectivo  = document.getElementById('efectivoCliente')?.value?.trim();
  const extra     = document.getElementById('especificaciones')?.value?.trim();

  const entregaTexto = { local:'Recoger en el local', domicilio:'Domicilio', comer:'Comer en el local' };

  let msg = "📦 *NUEVO PEDIDO — El Bembé*\n\n";
  if (nombre)   msg += "👤 *Nombre:* " + nombre + "\n";
  if (telefono) msg += "📞 *Número:* " + telefono + "\n";
  if (nombre || telefono) msg += "\n";

  msg += "🍽️ *Platos:*\n" + lineas.join('\n') + "\n\n";

  if (entrega) {
    msg += "📦 *Entrega:* " + (entregaTexto[entrega] || entrega) + "\n";
    if (entrega === 'comer' && mesa)          msg += "🪑 *Mesa:* " + mesa + "\n";
    if (entrega === 'domicilio' && direccion) msg += "📍 *Dirección:* " + direccion + "\n";
    msg += "\n";
  }

  if (pago)     msg += "💳 *Pago:* " + pago + "\n";
  if (efectivo) msg += "💵 *Con cuánto paga:* " + efectivo + "\n";
  if (pago || efectivo) msg += "\n";

  if (extra) msg += "📝 *Extras:* " + extra + "\n\n";

  msg += "💰 *Total: " + formatCOP(total) + "*";

  // ── Cambiar botón a "Enviando..." ──
  const btnConfirmar = document.querySelector('.btn-confirmar');
  if (btnConfirmar) {
    btnConfirmar.disabled = true;
    btnConfirmar.textContent = "Enviando...";
  }

  // ── Enviar a Google Sheets sin esperar ──
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuO4PrczRKm5GfJxmg5Z9C6L-MySlY5dCkLwxlXsFJHAoW4sXCP7MKAM0WkOsHlwtJ/exec";

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      nombre:        nombre    || "",
      telefono:      telefono  || "",
      platos:        lineas.join(', '),
      metodoEntrega: entrega   || "",
      direccion:     direccion || "",
      metodoPago:    pago      || "",
      total:         total
    }),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  });

  // ── Abrir WhatsApp de inmediato ──
  window.location.href = `https://wa.me/${WS}?text=${encodeURIComponent(msg)}`;
}
</script>

<script src="script.js" charset="UTF-8"></script>
</body>
</html>
